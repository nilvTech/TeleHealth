<script>
    window.downloadFile = (fileName, contentType, bytesBase64) => {
        const link = document.createElement('a');
        link.download = fileName;

        const blob = new Blob(
            [new Uint8Array(bytesBase64)],
            { type: contentType }
        );

        link.href = URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    window.printAuditTable = () => {
        const printContent = document.querySelector('.table-card').innerHTML;
        const win = window.open('', '', 'width=900,height=650');

        win.document.write(`
            <html>
            <head>
                <title>Audit Logs</title>
                <style>
                    table { width:100%; border-collapse: collapse; }
                    th, td { border:1px solid #ccc; padding:8px; }
                    th { background:#f5f5f5; }
                </style>
            </head>
            <body>
                <h2>Audit Logs</h2>
                ${printContent}
            </body>
            </html>
        `);

        win.document.close();
        win.print();
    };
</script>

<script>
    window.scrollToMatrix = function () {
        const el = document.getElementById("permissionMatrix");
        if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
        }
    }
</script>
